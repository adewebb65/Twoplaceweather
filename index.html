const bfLabel = b =>
  ["Calm","Light air","Light breeze","Gentle breeze","Moderate breeze",
   "Fresh breeze","Strong breeze","Near gale","Gale"][Math.min(b,8)];

const scoreColor = s =>
  s<=1?"#ef4444":s===2?"#f97316":s===3?"#eab308":s===4?"#22c55e":"#10b981";

const tempColor = t => {
  if(t<0)  return "#1e3a8a";
  if(t<5)  return "#60a5fa";
  if(t<10) return "#22c55e";
  if(t<15) return "#eab308";
  if(t<20) return "#f97316";
  if(t<25) return "#f87171";
  return "#991b1b";
};

const toMins = s => { const [h,m]=s.split(":").map(Number); return h*60+m; };

const nowTemp = (day, now) => {
  const h = now.getHours() + now.getMinutes()/60;
  return Math.round(day.min + (day.max-day.min) *
    Math.sin(Math.PI * Math.max(0, Math.min(h-6,16)) / 16));
};

const daylightStr = (sr, ss) => {
  const m = toMins(ss) - toMins(sr);
  return `${Math.floor(m/60)}h ${m%60}m`;
};

function WindArrow({dir, acc}) {
  const deg = {N:180,NE:225,E:270,SE:315,S:0,SW:45,W:90,NW:135}[dir]||0;
  return <span style={{display:"inline-block",transform:`rotate(${deg}deg)`,fontSize:14,color:acc}}>↑</span>;
}

function TideCard({tideDay, now, card, border, textMuted, textPri}) {
  const nowM = now.getHours()*60 + now.getMinutes();
  const evs  = tideDay.events.map(e => ({...e, mins:toMins(e.t)}));
  let next   = evs[evs.length-1];
  for(let i=0; i<evs.length; i++) { if(evs[i].mins > nowM) { next=evs[i]; break; } }
  const rising = next.type === "HW";
  const ml     = next.mins - nowM;
  const timeToNext = ml > 0
    ? `${Math.floor(ml/60)}h ${ml%60}m until ${rising?"high":"low"} water`
    : `${next.type} at ${next.t}`;
  const hw   = tideDay.events.filter(e=>e.type==="HW");
  const lw   = tideDay.events.filter(e=>e.type==="LW");
  const cols = Math.max(hw.length, lw.length);
  const hdrs = ["1st","2nd","3rd"].slice(0, cols);
  return (
    <div style={{...card, gridColumn:"span 2"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>{rising?"🌊":"🏖️"}</span>
          <span style={{fontSize:14,fontWeight:700,color:rising?"#22c55e":"#60a5fa"}}>{rising?"Rising":"Ebbing"}</span>
          <span style={{fontSize:12,color:textMuted}}>{timeToNext}</span>
        </div>
        <div style={{fontSize:11,color:textMuted}}>Axmouth · {tideDay.tz} · {tideDay.range}</div>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr>
            <td style={{color:textMuted,fontSize:11,paddingBottom:6,width:80}}></td>
            {hdrs.map((h,i) => <td key={i} style={{color:textMuted,fontSize:11,paddingBottom:6,textAlign:"center",letterSpacing:1,textTransform:"uppercase"}}>{h}</td>)}
          </tr>
        </thead>
        <tbody>
          <tr style={{borderTop:`1px solid ${border}`}}>
            <td style={{color:"#fbbf24",fontWeight:700,padding:"7px 0",fontSize:12}}>▲ HIGH</td>
            {hdrs.map((_,i) => (
              <td key={i} style={{textAlign:"center",padding:"7px 0"}}>
                {hw[i]
                  ? <div><div style={{fontWeight:700,fontSize:15,color:textPri}}>{hw[i].t}</div><div style={{fontSize:11,color:textMuted}}>{hw[i].h}m</div></div>
                  : <span style={{color:textMuted}}>—</span>}
              </td>
            ))}
          </tr>
          <tr style={{borderTop:`1px solid ${border}`}}>
            <td style={{color:"#60a5fa",fontWeight:700,padding:"7px 0",fontSize:12}}>▼ LOW</td>
            {hdrs.map((_,i) => (
              <td key={i} style={{textAlign:"center",padding:"7px 0"}}>
                {lw[i]
                  ? <div><div style={{fontWeight:700,fontSize:15,color:textPri}}>{lw[i].t}</div><div style={{fontSize:11,color:textMuted}}>{lw[i].h}m</div></div>
                  : <span style={{color:textMuted}}>—</span>}
              </td>
            ))}
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function SunCard({day, now, city, card, border, textMuted, textPri}) {
  const srM   = toMins(day.sr);
  const ssM   = toMins(day.ss);
  const nowM  = now.getHours()*60 + now.getMinutes();
  const srPct = (srM/1440)*100;
  const dlPct = ((ssM-srM)/1440)*100;
  const nowPct= (nowM/1440)*100;
  const isDay = nowM >= srM && nowM <= ssM;
  const loc   = city==="axmouth" ? "Axmouth" : "London";
  return (
    <div style={{...card, gridColumn:"span 2"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:textMuted}}>
          Daylight · {loc} · {day.short} {day.date}
        </div>
        <div style={{fontSize:11,color:textMuted}}>{day.tz}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:"#fbbf24",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>🌅 Sunrise</div>
          <div style={{fontSize:22,fontWeight:700,color:textPri}}>{day.sr}</div>
        </div>
        <div style={{textAlign:"center",borderLeft:`1px solid ${border}`,borderRight:`1px solid ${border}`}}>
          <div style={{fontSize:11,color:"#60a5fa",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>☀️ Daylight</div>
          <div style={{fontSize:22,fontWeight:700,color:textPri}}>{daylightStr(day.sr,day.ss)}</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:"#818cf8",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>🌇 Sunset</div>
          <div style={{fontSize:22,fontWeight:700,color:textPri}}>{day.ss}</div>
        </div>
      </div>
      <div style={{position:"relative",height:20,borderRadius:6,background:"#0f172a",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,bottom:0,left:`${srPct}%`,width:`${dlPct}%`,
          background:"linear-gradient(90deg,#f59e0b44,#fbbf24bb,#f59e0b44)",borderRadius:4}}/>
        <div style={{position:"absolute",top:0,bottom:0,width:2,left:`${nowPct}%`,
          background:isDay?"#ffffff":"#475569",
          boxShadow:isDay?"0 0 6px rgba(255,255,255,0.5)":"none"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:textMuted}}>
        <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
      </div>
    </div>
  );
}

function TempLineGraph({days, selIdx, setSelIdx, acc, textMuted, textPri}) {
  const allMax = days.map(d=>d.max);
  const lo     = Math.min(...allMax);
  const hi     = Math.max(...allMax);
  const range  = Math.max(hi-lo, 4);
  const barH   = 64;
  const yOf    = v => barH - Math.round(((v-lo)/range)*(barH-20)) - 8;

  return (
    <div style={{marginBottom:0,position:"relative"}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:8,color:textPri,paddingLeft:90}}>
        Temperature °C
      </div>
      <div style={{display:"flex",alignItems:"flex-end",height:barH+20,position:"relative"}}>
        <div style={{width:90,flexShrink:0}}/>
        {days.map((d,i) => {
          const dotY = yOf(d.max);
          const col  = tempColor(d.max);
          return (
            <div key={i} onClick={()=>setSelIdx(i)}
              style={{flex:1,position:"relative",height:barH+20,cursor:"pointer"}}>
              <div style={{
                position:"absolute",left:"50%",top:dotY,
                transform:"translate(-50%,-50%)",
                width:i===selIdx?12:8,height:i===selIdx?12:8,
                borderRadius:"50%",background:col,
                border:i===selIdx?"2px solid #fff":"2px solid transparent",
                boxShadow:i===selIdx?`0 0 6px ${col}`:"none",
                zIndex:2,transition:"all .15s"
              }}/>
              <div style={{
                position:"absolute",left:"50%",top:dotY-18,
                transform:"translateX(-50%)",
                fontSize:10,fontWeight:i===selIdx?700:400,
                color:i===selIdx?"#fff":textMuted,
                whiteSpace:"nowrap",zIndex:2
              }}>{d.max}</div>
            </div>
          );
        })}
        <svg style={{position:"absolute",left:90,top:0,width:"calc(100% - 90px)",
          height:barH+20,overflow:"visible",pointerEvents:"none"}}
          preserveAspectRatio="none">
          <defs>
            {days.slice(0,-1).map((_,i) => (
              <linearGradient key={i} id={`tg${i}`} x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stopColor={tempColor(days[i].max)}/>
                <stop offset="100%" stopColor={tempColor(days[i+1].max)}/>
              </linearGradient>
            ))}
          </defs>
          {days.slice(0,-1).map((_,i) => {
            const n    = days.length;
            const colW = 100/n;
            const x1   = `${(i+0.5)*colW}%`;
            const x2   = `${(i+1.5)*colW}%`;
            const y1   = yOf(days[i].max);
            const y2   = yOf(days[i+1].max);
            const flat = Math.abs(y1-y2) < 2;
            return (
              <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
                stroke={flat ? tempColor(days[i].max) : `url(#tg${i})`}
                strokeWidth={2.5} strokeLinecap="round"/>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [city,   setCity]   = useState("axmouth");
  const [selIdx, setSelIdx] = useState(0);
  const [days,   setDays]   = useState(null);
  const [vocs,   setVocs]   = useState(null);
  const [now,    setNow]    = useState(new Date());

  const sliceFromToday = (src) => {
    const n = new Date().getDate();
    const i = src.findIndex(d => d.dateNum >= n);
    return src.slice(i>=0?i:0, i>=0?i+7:7);
  };

  useEffect(() => {
    setDays(sliceFromToday(AX));
    setVocs(AX_VOCS);
    setSelIdx(0);
    const t = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(t);
  }, []);

  const switchCity = k => {
    const src = k==="axmouth" ? AX : LDN;
    setCity(k);
    setDays(sliceFromToday(src));
    setVocs(k==="axmouth" ? AX_VOCS : LDN_VOCS);
    setSelIdx(0);
  };

  if(!days || !days.length) return <div style={{background:"#0d0f14",minHeight:"100vh"}}/>;

  const day     = days[selIdx];
  const tideDay = TIDES[day.ti];
  const moon    = MOON[day.mi];
  const acc     = city==="axmouth" ? "#0f766e" : "#1d4ed8";
  const bg      = "#0d0f14";
  const surface = "#161920";
  const border  = "rgba(255,255,255,0.28)";
  const textPri = "#ffffff";
  const textMuted="#c8d0db";
  const highlight="#1e2230";
  const card = {background:surface,border:`1px solid ${border}`,borderRadius:10,padding:"14px 16px"};
  const lbl  = {fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:textMuted,marginBottom:6};

  // Yesterday's data for 24h card
  const todayNum = new Date().getDate();
  const srcAll   = city==="axmouth" ? AX : LDN;
  const yest     = srcAll.find(d => d.dateNum === todayNum-1) || null;

  return (
    <div style={{fontFamily:"'Helvetica Neue',Arial,sans-serif",background:bg,minHeight:"100vh",color:textPri,fontSize:15}}>

      {/* ── HEADER ── */}
      <div style={{background:surface,borderBottom:`1px solid ${border}`,padding:"14px 20px"}}>
        <div style={{maxWidth:940,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:12,letterSpacing:2,textTransform:"uppercase",color:textMuted,marginBottom:4}}>
                WEATHER 25 MARCH – 3 APRIL 2026
              </div>
              <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5}}>
                {city==="axmouth"?"Axmouth":"London"}
                <span style={{fontWeight:400,color:textMuted,fontSize:14,marginLeft:12}}>
                  {city==="axmouth"?"East Devon · 50.70°N 3.05°W":"Greater London · 51.5°N 0.1°W"}
                </span>
              </div>
            </div>
            <div style={{display:"flex",background:bg,borderRadius:8,padding:3,gap:2,border:`1px solid ${border}`}}>
              {[["axmouth","Axmouth"],["london","London"]].map(([k,l]) => (
                <button key={k} onClick={()=>switchCity(k)} style={{
                  background:city===k?(k==="axmouth"?"#0f766e":"#1d4ed8"):"transparent",
                  color:"#fff",border:"none",borderRadius:6,padding:"6px 16px",
                  fontWeight:600,fontSize:14,cursor:"pointer",transition:"all .15s"
                }}>{l}</button>
              ))}
            </div>
          </div>
          {/* Day strip */}
          <div style={{display:"flex",gap:6,marginTop:14,overflowX:"auto",paddingBottom:2}}>
            {days.map((d,i) => (
              <button key={i} onClick={()=>setSelIdx(i)} style={{
                flex:"0 0 auto",
                background:i===selIdx?acc:surface,
                color:"#fff",
                border:`2px solid ${i===selIdx?acc:border}`,
                borderRadius:8,padding:"8px 14px",cursor:"pointer",
                minWidth:62,transition:"all .12s"
              }}>
                <div style={{fontWeight:700,fontSize:13}}>{d.short}{i===0?" · Today":""}</div>
                <div style={{fontSize:11,color:i===selIdx?"rgba(255,255,255,.7)":textMuted,marginTop:2}}>{d.date}</div>
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:940,margin:"0 auto",padding:"18px 16px"}}>

        {/* ── METRICS GRID ── */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:14}}>

          {/* Temperature */}
          <div style={card}>
            <div style={lbl}>Temperature</div>
            <div style={{fontSize:44,fontWeight:700,letterSpacing:-2,lineHeight:1}}>{nowTemp(day,now)}°C</div>
            <div style={{fontSize:11,color:textMuted,marginTop:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 10px"}}>
              <span>↑ High <strong style={{color:textPri}}>{day.max}°C</strong></span>
              <span>↓ Low <strong style={{color:textPri}}>{day.min}°C</strong></span>
              <span style={{gridColumn:"span 2"}}>Feels like <strong style={{color:textPri}}>{day.fl}°C</strong></span>
            </div>
          </div>

          {/* Wind */}
          <div style={card}>
            <div style={lbl}>Wind</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <div>
                <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,lineHeight:1,display:"flex",alignItems:"center",gap:8}}>
                  {day.wind} mph
                  <WindArrow dir={day.dir} acc={acc}/>
                  <span style={{fontSize:17,color:acc}}>{day.dir}</span>
                </div>
                <div style={{fontSize:13,color:textMuted,marginTop:5}}>Gusts {day.gust} mph</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:32,lineHeight:1}}>
                  {day.bf<=1?"🪨":day.bf<=3?"🍃":day.bf<=5?"💨":day.bf<=7?"🌬️":"🌀"}
                </div>
                <div style={{fontSize:11,color:textMuted,marginTop:4}}>{bfLabel(day.bf)}</div>
              </div>
            </div>
          </div>

          {/* Last 24h */}
          {yest && (
            <div style={card}>
              <div style={lbl}>Last 24 Hours · {city==="axmouth"?"Seaton":"London"}</div>
              <div style={{display:"flex",gap:16,alignItems:"center",marginTop:4}}>
                <div style={{textAlign:"center",flex:1}}>
                  <div style={{fontSize:11,color:"#60a5fa",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>↓ Low</div>
                  <div style={{fontSize:34,fontWeight:700,letterSpacing:-1,lineHeight:1,color:"#60a5fa"}}>
                    {yest.min}<sup style={{fontSize:"50%",fontWeight:400}}>°C</sup>
                  </div>
                  <div style={{fontSize:11,color:textMuted,marginTop:3}}>{yest.short} overnight</div>
                </div>
                <div style={{width:"1px",background:border,alignSelf:"stretch"}}/>
                <div style={{textAlign:"center",flex:1}}>
                  <div style={{fontSize:11,color:"#fbbf24",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>↑ High</div>
                  <div style={{fontSize:34,fontWeight:700,letterSpacing:-1,lineHeight:1,color:"#fbbf24"}}>
                    {yest.max}<sup style={{fontSize:"50%",fontWeight:400}}>°C</sup>
                  </div>
                  <div style={{fontSize:11,color:textMuted,marginTop:3}}>{yest.short} afternoon</div>
                </div>
              </div>
            </div>
          )}

          {/* Rain 3×3 */}
          <div style={card}>
            <div style={lbl}>Rain Risk · 27h</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3}}>
              {day.rain3h.slice(0,9).map((pct,i) => {
                const s=i*3, e=s+3;
                const bg2=pct>75?"#ef4444":pct>25?"#f59e0b":"#22c55e";
                const tc=pct>25&&pct<=75?"#000":"#fff";
                return (
                  <div key={i} style={{background:bg2,borderRadius:5,padding:"6px 2px",
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                    <div style={{fontSize:12,fontWeight:700,color:tc,lineHeight:1}}>{pct}%</div>
                    <div style={{fontSize:9,color:tc,opacity:0.85,textAlign:"center",lineHeight:1.2}}>
                      {String(s).padStart(2,"0")}–{String(e).padStart(2,"0")}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Swell / Visibility */}
          {city==="axmouth" ? (
            <div style={card}>
              <div style={lbl}>Axmouth Swell</div>
              <div style={{fontSize:19,fontWeight:700,lineHeight:1.3}}>{day.swell}</div>
              <div style={{fontSize:13,color:textMuted,marginTop:5}}>Sea temp {day.seaT}°C</div>
            </div>
          ) : (
            <div style={card}>
              <div style={lbl}>Visibility</div>
              <div style={{fontSize:19,fontWeight:700,lineHeight:1.3}}>{day.vis}</div>
              <div style={{fontSize:13,color:textMuted,marginTop:5}}>Humidity {day.hum}%</div>
            </div>
          )}

          {/* Moon */}
          <div style={card}>
            <div style={lbl}>Moon Phase</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:34,lineHeight:1}}>{moon.icon}</span>
              <div>
                <div style={{fontSize:14,fontWeight:700,lineHeight:1.2}}>{moon.name}</div>
                <div style={{fontSize:13,color:textMuted,marginTop:3}}>{moon.pct}% illuminated</div>
              </div>
            </div>
            <div style={{fontSize:12,color:textMuted,marginTop:8,lineHeight:1.5}}>{moon.note}</div>
          </div>

          {/* Tides — Axmouth only */}
          {city==="axmouth" && (
            <TideCard tideDay={tideDay} now={now} card={card}
              border={border} textMuted={textMuted} textPri={textPri}/>
          )}

          {/* Daylight */}
          <SunCard day={day} now={now} city={city} card={card}
            border={border} textMuted={textMuted} textPri={textPri}/>

        </div>

        {/* ── CONDITION ── */}
        <div style={{...card,marginBottom:14}}>
          <div style={lbl}>Synoptic Summary · {day.short} {day.date}</div>
          <div style={{fontSize:15,lineHeight:1.65}}>{day.condition}</div>
        </div>

        {/* ── WEEK AT A GLANCE ── */}
        <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:textMuted,marginBottom:10}}>
          Week at a Glance
        </div>
        <div style={{...card,marginBottom:14}}>
          <div style={{marginBottom:16}}>
            <TempLineGraph days={days} selIdx={selIdx} setSelIdx={setSelIdx}
              acc={acc} textMuted={textMuted} textPri={textPri}/>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr>
                  <td style={{color:textMuted,paddingBottom:7,width:90}}></td>
                  {days.map((d,i) => (
                    <td key={i} onClick={()=>setSelIdx(i)} style={{
                      textAlign:"center",paddingBottom:7,cursor:"pointer",
                      color:i===selIdx?acc:textPri,fontWeight:i===selIdx?700:500
                    }}>{d.short}</td>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[
                  {label:"Gust mph",fn:d=>d.gust,     col:v=>v>=40?"#ef4444":v>=25?"#f97316":textPri},
                  {label:"Wind dir", fn:d=>d.dir,       col:()=>textPri},
                  {label:"Rain %",   fn:d=>d.rain+"%",  col:v=>parseInt(v)>60?"#ef4444":parseInt(v)>30?"#f97316":"#22c55e"},
                  {label:"Humidity", fn:d=>d.hum+"%",   col:()=>textPri},
                ].map(row => (
                  <tr key={row.label} style={{borderTop:`1px solid ${border}`}}>
                    <td style={{color:textMuted,padding:"6px 0",fontWeight:500}}>{row.label}</td>
                    {days.map((d,i) => {
                      const val = row.fn(d);
                      return (
                        <td key={i} style={{
                          textAlign:"center",fontWeight:600,color:row.col(val),
                          background:i===selIdx?highlight:undefined,padding:"6px 0"
                        }}>{val}</td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* ── ACTIVITY HEATMAP ── */}
        <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:textMuted,marginBottom:10}}>
          Activity Heatmap
        </div>
        <div style={{...card,marginBottom:14}}>
          {vocs.map(v => (
            <div key={v.key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:134,fontSize:12,display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                <span>{v.icon}</span>
                <span style={{fontWeight:600}}>{v.label.split(" ")[0]}</span>
              </div>
              <div style={{flex:1,display:"flex",gap:3}}>
                {days.map((d,i) => {
                  const origIdx = AX.findIndex(a => a.dateNum===d.dateNum);
                  const s   = v.scores[origIdx>=0?origIdx:i] ?? 3;
                  const col = scoreColor(s);
                  return (
                    <div key={i} onClick={()=>setSelIdx(i)} style={{
                      flex:1,height:26,borderRadius:4,cursor:"pointer",
                      background:i===selIdx?col:col+"30",
                      border:`2px solid ${i===selIdx?col:col+"55"}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:10,fontWeight:700,color:i===selIdx?"#fff":col,transition:"all .12s"
                    }}>{s}</div>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{display:"flex",gap:3,marginLeft:142,marginTop:4}}>
            {days.map((d,i) => (
              <div key={i} style={{flex:1,textAlign:"center",fontSize:10,
                color:i===selIdx?acc:textMuted}}>{d.short}</div>
            ))}
          </div>
        </div>

        {/* ── FOOTER ── */}
        <div style={{fontSize:11,color:textMuted,lineHeight:1.8,borderTop:`1px solid ${border}`,paddingTop:14}}>
          <div style={{marginBottom:4}}>
            <strong style={{color:textPri}}>Weather sources:</strong> Met Office UK · The Weather Outlook
            (GFS/ECMWF) · world-weather.info · Windy.app · surf-forecast.com · Surfline ·
            weather-forecast.com · Swellinfo (Exmouth)
          </div>
          <div style={{marginBottom:4}}>
            <strong style={{color:textPri}}>Tide data:</strong> devon-tides.com · Lyme Regis standard port ·
            BST from 29 Mar · Projected from 20–21 Mar actuals
          </div>
          <div style={{marginBottom:4}}>
            <strong style={{color:textPri}}>Sunrise/sunset:</strong> timeanddate.com (East Devon / London) ·
            BST applied from 29 Mar
          </div>
          <div>
            ⚠ Tide times are indicative only — not for navigation. Activity indices are interpretive.
            Forecast confidence decreases beyond 5 days. Current temperature estimated from diurnal
            interpolation. Yesterday's 24h figures are forecast min/max, not observed station data.
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
