<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Weather · Axmouth &amp; London</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Weather"/>
  <meta name="theme-color" content="#0d0f14"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0d0f14;color:#fff}
    body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
    button{font-family:inherit}
    #root{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    .spin{display:inline-block;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── LOCATIONS ─────────────────────────────────────────────────────────────────
const LOCS = {
  axmouth:{ lat:50.70, lon:-3.05, name:"Axmouth", region:"East Devon · 50.70°N 3.05°W", accent:"#0f766e" },
  london: { lat:51.51, lon:-0.13, name:"London",  region:"Greater London · 51.5°N 0.1°W",  accent:"#1d4ed8" },
};

// ── PURE HELPERS ──────────────────────────────────────────────────────────────
const toMins = s => { const [h,m]=s.split(":").map(Number); return h*60+m; };
const bfLabel = b => ["Calm","Light air","Light breeze","Gentle breeze","Moderate breeze","Fresh breeze","Strong breeze","Near gale","Gale"][Math.min(b,8)];
const mphToBf = v => v<1?0:v<4?1:v<8?2:v<13?3:v<18?4:v<25?5:v<32?6:v<39?7:8;
const degToCompass = d => ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"][Math.round(d/22.5)%16];
const tempColor = t => t<0?"#1e3a8a":t<5?"#60a5fa":t<10?"#22c55e":t<15?"#eab308":t<20?"#f97316":t<25?"#f87171":"#991b1b";
const scoreColor = s => s<=1?"#ef4444":s===2?"#f97316":s===3?"#eab308":s===4?"#22c55e":"#10b981";
const nowTemp = (day,now) => { const h=now.getHours()+now.getMinutes()/60; return Math.round(day.min+(day.max-day.min)*Math.sin(Math.PI*Math.max(0,Math.min(h-6,16))/16)); };
const daylightStr = (sr,ss) => { const m=toMins(ss)-toMins(sr); return `${Math.floor(m/60)}h ${m%60}m`; };

// ── WMO CODES ─────────────────────────────────────────────────────────────────
const wmoText = (code,wind) => {
  const w=wind>=35?" Gale force winds.":wind>=25?" Strong winds.":wind>=18?" Breezy.":"";
  const t={0:"Clear sky.",1:"Mainly clear.",2:"Partly cloudy.",3:"Overcast.",45:"Fog.",48:"Freezing fog.",
    51:"Light drizzle.",53:"Moderate drizzle.",55:"Heavy drizzle.",61:"Light rain.",63:"Moderate rain.",
    65:"Heavy rain.",71:"Light snow.",73:"Moderate snow.",75:"Heavy snow.",80:"Light showers.",
    81:"Rain showers.",82:"Heavy showers.",85:"Snow showers.",95:"Thunderstorm.",96:"Thunderstorm with hail."};
  return (t[code]||"Variable conditions.")+w;
};
const wmoVis = c => c<=1?"Excellent":c===2?"Very Good":c===3||c>=80?"Good":c>=45&&c<=48?"Poor":"Moderate";

// ── MOON PHASE ────────────────────────────────────────────────────────────────
const KNOWN_NEW = new Date('2026-03-16T09:00:00Z').getTime();
const SYNODIC   = 29.53059*86400000;
const moonPhase = date => {
  const phase = ((date.getTime()-KNOWN_NEW)%SYNODIC+SYNODIC)%SYNODIC/86400000;
  const pct   = Math.round((1-Math.cos(2*Math.PI*phase/29.53059))/2*100);
  if(phase<1.85)  return {icon:"🌑",name:"New Moon",     pct,note:"Dark sky — ideal for stargazing."};
  if(phase<7.38)  return {icon:"🌒",name:"Waxing Crescent",pct,note:"Crescent visible in the west after sunset."};
  if(phase<9.22)  return {icon:"🌓",name:"First Quarter", pct,note:"Half-lit, sets around midnight."};
  if(phase<14.77) return {icon:"🌔",name:"Waxing Gibbous",pct,note:"Bright and growing. Tidal ranges increasing."};
  if(phase<16.61) return {icon:"🌕",name:"Full Moon",     pct,note:"Maximum spring tides. Exceptional night visibility."};
  if(phase<22.15) return {icon:"🌖",name:"Waning Gibbous",pct,note:"Waning. Rising later each evening."};
  if(phase<23.99) return {icon:"🌗",name:"Last Quarter",  pct,note:"Half-lit, rises around midnight."};
  return                 {icon:"🌘",name:"Waning Crescent",pct,note:"Low light. Tidal ranges easing."};
};

// ── TIDAL MODEL (Lyme Regis harmonic constituents) ────────────────────────────
// Spring HW reference: 29 Mar 2026 00:26 UTC ≈ 4.5m
// M2 (principal lunar semidiurnal): A=1.45m, T=12.4206h
// S2 (principal solar semidiurnal):  A=0.60m, T=12.0000h
// Z0 (mean sea level above chart datum): 2.85m
const TIDE_REF = new Date('2026-03-29T00:26:00Z').getTime();
const Z0=2.85, AM2=1.45, AS2=0.60, WM2=2*Math.PI/12.4206, WS2=2*Math.PI/12.0;
const tideH = t => Z0+AM2*Math.cos(WM2*(t-TIDE_REF)/3600000)+AS2*Math.cos(WS2*(t-TIDE_REF)/3600000);

const isBST = d => d.getTime()>=new Date('2026-03-29T01:00:00Z').getTime() && d.getTime()<new Date('2026-10-25T01:00:00Z').getTime();

const computeTides = dateStr => {
  const dayUTC  = new Date(dateStr+'T00:00:00Z').getTime();
  const bst     = isBST(new Date(dateStr+'T12:00:00Z'));
  const tzMs    = bst ? 3600000 : 0;
  const targetD = new Date(dateStr+'T12:00:00Z').getUTCDate();
  const events  = [];
  const STEP    = 6*60000; // 6 min
  let p2=tideH(dayUTC), p1=tideH(dayUTC+STEP);
  for(let i=2;i<=270;i++){
    const tUTC=dayUTC+i*STEP;
    const curr=tideH(tUTC);
    const tLoc=new Date(tUTC+tzMs);
    if(tLoc.getUTCDate()===targetD){
      const hh=String(tLoc.getUTCHours()).padStart(2,'0'), mm=String(tLoc.getUTCMinutes()).padStart(2,'0');
      if(p1>p2&&p1>curr) events.push({t:`${hh}:${mm}`,h:Math.round(p1*10)/10,type:"HW"});
      if(p1<p2&&p1<curr) events.push({t:`${hh}:${mm}`,h:Math.max(0.1,Math.round(p1*10)/10),type:"LW"});
    }
    p2=p1; p1=curr;
  }
  return events.sort((a,b)=>toMins(a.t)-toMins(b.t));
};

// ── ACTIVITY SCORES ───────────────────────────────────────────────────────────
const score = (key,city,d) => {
  const {gust,rain,max,waveH=0} = d;
  if(city==="axmouth"){
    if(key==="cycling") return gust>=40?1:gust>=28||rain>60?2:rain>35||gust>=20?3:rain<20&&gust<15&&max>=8?5:4;
    if(key==="surfing")  return gust>=40?2:waveH<0.3?1:waveH>3&&gust>20?2:waveH>=1.0&&waveH<=2.5&&gust<20?5:waveH>=0.5&&gust<25?4:3;
    if(key==="hiking")   return gust>=40||rain>60?2:rain<20&&gust<15&&max>=6?5:rain<35&&gust<25?4:3;
  }
  if(city==="london"){
    if(key==="cycling") return gust>=40?1:gust>=30||rain>60?2:rain>40||gust>=22?3:rain<20&&gust<12&&max>=8?5:4;
    if(key==="surfing")  return gust>=35||rain>70?2:3;
    if(key==="hiking")   return gust>=40||rain>60?2:rain<20&&gust<15&&max>=6?5:rain<35&&gust<25?4:3;
  }
  return 3;
};

const VOCS = {
  axmouth:[{key:"cycling",label:"Road Cycling",icon:"🚴"},{key:"surfing",label:"Surfing",icon:"🏄"},{key:"hiking",label:"Hiking (SWCP)",icon:"🥾"}],
  london: [{key:"cycling",label:"Road Cycling",icon:"🚴"},{key:"surfing",label:"Surfing (Kent)",icon:"🏄"},{key:"hiking",label:"Hiking (N.Downs)",icon:"🥾"}],
};

// ── API FETCHES ───────────────────────────────────────────────────────────────
const fetchWeather = async city => {
  const {lat,lon} = LOCS[city];
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&daily=temperature_2m_max,temperature_2m_min,apparent_temperature_max,`+
    `precipitation_probability_max,windspeed_10m_max,windgusts_10m_max,`+
    `winddirection_10m_dominant,sunrise,sunset,uv_index_max,weathercode`+
    `&hourly=precipitation_probability,temperature_2m,relativehumidity_2m`+
    `&wind_speed_unit=mph&timezone=Europe%2FLondon&forecast_days=7&past_days=1`;
  const r=await fetch(url);
  if(!r.ok) throw new Error("Weather API error");
  return r.json();
};

const fetchMarine = async () => {
  const r=await fetch(`https://marine-api.open-meteo.com/v1/marine`+
    `?latitude=50.62&longitude=-3.43`+
    `&daily=wave_height_max,wave_period_max,wave_direction_dominant`+
    `&timezone=Europe%2FLondon&forecast_days=7&past_days=1`);
  if(!r.ok) return null;
  return r.json();
};

const parseResponse = (wx,marine,city) => {
  const {daily,hourly}=wx;
  const _n=new Date(); const todayStr=`${_n.getFullYear()}-${String(_n.getMonth()+1).padStart(2,'0')}-${String(_n.getDate()).padStart(2,'0')}`;
  const todayI=daily.time.findIndex(t=>t===todayStr);
  if(todayI<0) return {forecast:[],yesterday:null};
  const DAY=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const build=i=>{
    const ds=daily.time[i];
    const dt=new Date(ds+'T12:00:00');
    const hi=i*24;
    const windMph=Math.round(daily.windspeed_10m_max[i]||0);
    const gustMph=Math.round(daily.windgusts_10m_max[i]||0);
    const wdir=degToCompass(daily.winddirection_10m_dominant[i]||0);
    const rain3h=Array.from({length:9},(_,j)=>hourly.precipitation_probability[hi+j*3]||0);
    const sr=(daily.sunrise[i]||"").slice(11,16)||"06:00";
    const ss=(daily.sunset[i]||"").slice(11,16)||"20:00";
    let waveH=0,waveP=0,waveD="W";
    if(marine&&marine.daily){
      waveH=marine.daily.wave_height_max[i]||0;
      waveP=Math.round(marine.daily.wave_period_max[i]||0);
      waveD=degToCompass(marine.daily.wave_direction_dominant[i]||270);
    }
    const max=Math.round(daily.temperature_2m_max[i]||10);
    const min=Math.round(daily.temperature_2m_min[i]||5);
    const d={
      short:DAY[dt.getDay()], date:`${dt.getDate()} ${MON[dt.getMonth()]}`, dateStr:ds,
      max, min, fl:Math.round(daily.apparent_temperature_max[i]||max),
      hum:Math.round(hourly.relativehumidity_2m[hi+12]||75), waveH,
      wind:windMph, gust:gustMph, dir:wdir, bf:mphToBf(windMph),
      rain:daily.precipitation_probability_max[i]||0, rain3h,
      swell:waveH>0?`${waveH.toFixed(1)}m·${waveP}s·${waveD}`:"—",
      vis:wmoVis(daily.weathercode[i]||0), seaT:9,
      tz:isBST(dt)?"BST":"GMT", sr, ss,
      condition:wmoText(daily.weathercode[i]||0,windMph),
      tideEvents:city==="axmouth"?computeTides(ds):[],
      moon:moonPhase(dt),
    };
    d.scores={cycling:score("cycling",city,d),surfing:score("surfing",city,d),hiking:score("hiking",city,d)};
    return d;
  };
  return {
    yesterday: todayI>0?build(todayI-1):null,
    forecast:  Array.from({length:Math.min(7,daily.time.length-todayI)},(_,j)=>build(todayI+j)),
  };
};

// ── SUB-COMPONENTS ────────────────────────────────────────────────────────────
function WindArrow({dir,acc}){
  const deg={N:180,NNE:202,NE:225,ENE:247,E:270,ESE:292,SE:315,SSE:337,S:0,SSW:22,SW:45,WSW:67,W:90,WNW:112,NW:135,NNW:157}[dir]||0;
  return <span style={{display:"inline-block",transform:`rotate(${deg}deg)`,color:acc}}>↑</span>;
}

function TideCard({day,now,card,border,textMuted,textPri}){
  if(!day.tideEvents.length) return null;
  const nowM=now.getHours()*60+now.getMinutes();
  const evs=day.tideEvents.map(e=>({...e,mins:toMins(e.t)}));
  let next=evs[evs.length-1];
  for(let i=0;i<evs.length;i++){if(evs[i].mins>nowM){next=evs[i];break;}}
  const rising=next.type==="HW";
  const ml=next.mins-nowM;
  const tnx=ml>0?`${Math.floor(ml/60)}h ${ml%60}m until ${rising?"high":"low"} water`:`${next.type} at ${next.t}`;
  const hw=day.tideEvents.filter(e=>e.type==="HW"), lw=day.tideEvents.filter(e=>e.type==="LW");
  const cols=Math.max(hw.length,lw.length), hdrs=["1st","2nd","3rd"].slice(0,cols);
  return (
    <div style={{...card,gridColumn:"span 2"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>{rising?"🌊":"🏖️"}</span>
          <span style={{fontSize:14,fontWeight:700,color:rising?"#22c55e":"#60a5fa"}}>{rising?"Rising":"Ebbing"}</span>
          <span style={{fontSize:12,color:textMuted}}>{tnx}</span>
        </div>
        <div style={{fontSize:11,color:textMuted}}>Axmouth · {day.tz} · Lyme Regis port</div>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr>
          <td style={{color:textMuted,fontSize:11,paddingBottom:6,width:80}}></td>
          {hdrs.map((h,i)=><td key={i} style={{color:textMuted,fontSize:11,paddingBottom:6,textAlign:"center",letterSpacing:1,textTransform:"uppercase"}}>{h}</td>)}
        </tr></thead>
        <tbody>
          <tr style={{borderTop:`1px solid ${border}`}}>
            <td style={{color:"#fbbf24",fontWeight:700,padding:"7px 0",fontSize:12}}>▲ HIGH</td>
            {hdrs.map((_,i)=><td key={i} style={{textAlign:"center",padding:"7px 0"}}>
              {hw[i]?<div><div style={{fontWeight:700,fontSize:15,color:textPri}}>{hw[i].t}</div><div style={{fontSize:11,color:textMuted}}>{hw[i].h}m</div></div>:<span style={{color:textMuted}}>—</span>}
            </td>)}
          </tr>
          <tr style={{borderTop:`1px solid ${border}`}}>
            <td style={{color:"#60a5fa",fontWeight:700,padding:"7px 0",fontSize:12}}>▼ LOW</td>
            {hdrs.map((_,i)=><td key={i} style={{textAlign:"center",padding:"7px 0"}}>
              {lw[i]?<div><div style={{fontWeight:700,fontSize:15,color:textPri}}>{lw[i].t}</div><div style={{fontSize:11,color:textMuted}}>{lw[i].h}m</div></div>:<span style={{color:textMuted}}>—</span>}
            </td>)}
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function SunCard({day,now,city,card,border,textMuted,textPri}){
  const srM=toMins(day.sr),ssM=toMins(day.ss),nowM=now.getHours()*60+now.getMinutes();
  const srPct=(srM/1440)*100,dlPct=((ssM-srM)/1440)*100,nowPct=(nowM/1440)*100;
  const isDay=nowM>=srM&&nowM<=ssM;
  return (
    <div style={{...card,gridColumn:"span 2"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:textMuted}}>
          Daylight · {city==="axmouth"?"Axmouth":"London"} · {day.short} {day.date}
        </div>
        <div style={{fontSize:11,color:textMuted}}>{day.tz}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:"#fbbf24",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>🌅 Sunrise</div>
          <div style={{fontSize:22,fontWeight:700,color:textPri}}>{day.sr}</div>
        </div>
        <div style={{textAlign:"center",borderLeft:`1px solid ${border}`,borderRight:`1px solid ${border}`}}>
          <div style={{fontSize:11,color:"#60a5fa",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>☀️ Daylight</div>
          <div style={{fontSize:22,fontWeight:700,color:textPri}}>{daylightStr(day.sr,day.ss)}</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:"#818cf8",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>🌇 Sunset</div>
          <div style={{fontSize:22,fontWeight:700,color:textPri}}>{day.ss}</div>
        </div>
      </div>
      <div style={{position:"relative",height:20,borderRadius:6,background:"#0f172a",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,bottom:0,left:`${srPct}%`,width:`${dlPct}%`,background:"linear-gradient(90deg,#f59e0b44,#fbbf24bb,#f59e0b44)",borderRadius:4}}/>
        <div style={{position:"absolute",top:0,bottom:0,width:2,left:`${nowPct}%`,background:isDay?"#fff":"#475569",boxShadow:isDay?"0 0 6px rgba(255,255,255,0.5)":"none"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:textMuted}}>
        <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
      </div>
    </div>
  );
}

function TempGraph({days,selIdx,setSelIdx,textMuted,textPri}){
  const allMax=days.map(d=>d.max), lo=Math.min(...allMax), hi=Math.max(...allMax), range=Math.max(hi-lo,4);
  const barH=64, yOf=v=>barH-Math.round(((v-lo)/range)*(barH-20))-8;
  return (
    <div style={{position:"relative",marginBottom:0}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:8,color:textPri,paddingLeft:90}}>Temperature °C</div>
      <div style={{display:"flex",alignItems:"flex-end",height:barH+20,position:"relative"}}>
        <div style={{width:90,flexShrink:0}}/>
        {days.map((d,i)=>{
          const dotY=yOf(d.max), col=tempColor(d.max);
          return (
            <div key={i} onClick={()=>setSelIdx(i)} style={{flex:1,position:"relative",height:barH+20,cursor:"pointer"}}>
              <div style={{position:"absolute",left:"50%",top:dotY,transform:"translate(-50%,-50%)",
                width:i===selIdx?12:8,height:i===selIdx?12:8,borderRadius:"50%",background:col,
                border:i===selIdx?"2px solid #fff":"2px solid transparent",
                boxShadow:i===selIdx?`0 0 6px ${col}`:"none",zIndex:2,transition:"all .15s"}}/>
              <div style={{position:"absolute",left:"50%",top:dotY-18,transform:"translateX(-50%)",
                fontSize:10,fontWeight:i===selIdx?700:400,color:i===selIdx?"#fff":textMuted,whiteSpace:"nowrap",zIndex:2}}>{d.max}</div>
            </div>
          );
        })}
        <svg style={{position:"absolute",left:90,top:0,width:"calc(100% - 90px)",height:barH+20,overflow:"visible",pointerEvents:"none"}} preserveAspectRatio="none">
          <defs>
            {days.slice(0,-1).map((_,i)=>(
              <linearGradient key={i} id={`tg${i}`} x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stopColor={tempColor(days[i].max)}/>
                <stop offset="100%" stopColor={tempColor(days[i+1].max)}/>
              </linearGradient>
            ))}
          </defs>
          {days.slice(0,-1).map((_,i)=>{
            const n=days.length, colW=100/n;
            const y1=yOf(days[i].max), y2=yOf(days[i+1].max), flat=Math.abs(y1-y2)<2;
            return <line key={i} x1={`${(i+0.5)*colW}%`} y1={y1} x2={`${(i+1.5)*colW}%`} y2={y2}
              stroke={flat?tempColor(days[i].max):`url(#tg${i})`} strokeWidth={2.5} strokeLinecap="round"/>;
          })}
        </svg>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [city,    setCity]    = useState("axmouth");
  const [selIdx,  setSelIdx]  = useState(0);
  const [forecast,setForecast]= useState([]);
  const [yest,    setYest]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  const [updated, setUpdated] = useState(null);
  const [now,     setNow]     = useState(new Date());

  const load = useCallback(async (c)=>{
    setLoading(true); setError(null);
    try {
      const [wx, marine] = await Promise.all([
        fetchWeather(c),
        c==="axmouth"?fetchMarine():Promise.resolve(null),
      ]);
      const {forecast:fc,yesterday} = parseResponse(wx,marine,c);
      if(!fc||fc.length===0){setError('No forecast data returned. The date may be outside the available range.');return;} setForecast(fc); setYest(yesterday); setSelIdx(0); setUpdated(new Date());
    } catch(e){ setError("Could not load live data. Check your connection."); }
    finally{ setLoading(false); }
  },[]);

  useEffect(()=>{
    load("axmouth");
    const clk=setInterval(()=>setNow(new Date()),60000);
    const ref=setInterval(()=>load(city),30*60000);
    return()=>{clearInterval(clk);clearInterval(ref);};
  },[]);

  const switchCity = k => { setCity(k); load(k); };

  const acc="#0f766e", bg="#0d0f14", surface="#161920", border="rgba(255,255,255,0.28)";
  const textPri="#ffffff", textMuted="#c8d0db", highlight="#1e2230";
  const cityAcc = city==="axmouth"?"#0f766e":"#1d4ed8";
  const card={background:surface,border:`1px solid ${border}`,borderRadius:10,padding:"14px 16px"};
  const lbl={fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:textMuted,marginBottom:6};
  const day=forecast[selIdx]||null;
  const vocs=VOCS[city];

  return (
    <div style={{fontFamily:"'Helvetica Neue',Arial,sans-serif",background:bg,minHeight:"100vh",color:textPri,fontSize:15}}>

      {/* HEADER */}
      <div style={{background:surface,borderBottom:`1px solid ${border}`,padding:"14px 20px"}}>
        <div style={{maxWidth:940,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:12,letterSpacing:2,textTransform:"uppercase",color:textMuted,marginBottom:4}}>
                LIVE WEATHER FORECAST
                {updated&&<span style={{marginLeft:8,fontSize:10,opacity:0.6}}>
                  · Updated {updated.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
                </span>}
              </div>
              <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5}}>
                {LOCS[city].name}
                <span style={{fontWeight:400,color:textMuted,fontSize:14,marginLeft:12}}>{LOCS[city].region}</span>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
              <div style={{display:"flex",background:bg,borderRadius:8,padding:3,gap:2,border:`1px solid ${border}`}}>
                {[["axmouth","Axmouth"],["london","London"]].map(([k,l])=>(
                  <button key={k} onClick={()=>switchCity(k)} style={{
                    background:city===k?cityAcc:"transparent",color:"#fff",border:"none",
                    borderRadius:6,padding:"6px 16px",fontWeight:600,fontSize:14,cursor:"pointer",transition:"all .15s"
                  }}>{l}</button>
                ))}
              </div>
              <button onClick={()=>load(city)} style={{
                background:"transparent",color:textMuted,border:`1px solid ${border}`,
                borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer"
              }}>↻ Refresh</button>
            </div>
          </div>
          {!loading&&forecast.length>0&&(
            <div style={{display:"flex",gap:6,marginTop:14,overflowX:"auto",paddingBottom:2}}>
              {forecast.map((d,i)=>(
                <button key={i} onClick={()=>setSelIdx(i)} style={{
                  flex:"0 0 auto",background:i===selIdx?cityAcc:surface,color:"#fff",
                  border:`2px solid ${i===selIdx?cityAcc:border}`,borderRadius:8,
                  padding:"8px 14px",cursor:"pointer",minWidth:62,transition:"all .12s"
                }}>
                  <div style={{fontWeight:700,fontSize:13}}>{d.short}{i===0?" · Today":""}</div>
                  <div style={{fontSize:11,color:i===selIdx?"rgba(255,255,255,.7)":textMuted,marginTop:2}}>{d.date}</div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      <div style={{maxWidth:940,margin:"0 auto",padding:"18px 16px"}}>

        {loading&&(
          <div style={{textAlign:"center",padding:"80px 0",color:textMuted}}>
            <div className="spin" style={{fontSize:36,marginBottom:16}}>⟳</div>
            <div style={{fontSize:14}}>Fetching live weather from Open-Meteo…</div>
          </div>
        )}

        {error&&!loading&&(
          <div style={{background:"#450a0a",border:"1px solid #ef4444",borderRadius:10,padding:16,marginBottom:14,color:"#fca5a5",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>{error}</span>
            <button onClick={()=>load(city)} style={{color:"#fff",background:"#ef4444",border:"none",borderRadius:6,padding:"4px 14px",cursor:"pointer",fontSize:13,marginLeft:12}}>Retry</button>
          </div>
        )}

        {!loading&&!error&&day&&(
          <>
            {/* METRICS GRID */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:14}}>

              <div style={card}>
                <div style={lbl}>Temperature</div>
                <div style={{fontSize:44,fontWeight:700,letterSpacing:-2,lineHeight:1}}>{nowTemp(day,now)}°C</div>
                <div style={{fontSize:11,color:textMuted,marginTop:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 10px"}}>
                  <span>↑ High <strong style={{color:textPri}}>{day.max}°C</strong></span>
                  <span>↓ Low <strong style={{color:textPri}}>{day.min}°C</strong></span>
                  <span style={{gridColumn:"span 2"}}>Feels like <strong style={{color:textPri}}>{day.fl}°C</strong></span>
                </div>
              </div>

              <div style={card}>
                <div style={lbl}>Wind</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <div>
                    <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,lineHeight:1,display:"flex",alignItems:"center",gap:8}}>
                      {day.wind} mph <WindArrow dir={day.dir} acc={cityAcc}/> <span style={{fontSize:17,color:cityAcc}}>{day.dir}</span>
                    </div>
                    <div style={{fontSize:13,color:textMuted,marginTop:5}}>Gusts {day.gust} mph</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:32,lineHeight:1}}>{day.bf<=1?"🪨":day.bf<=3?"🍃":day.bf<=5?"💨":day.bf<=7?"🌬️":"🌀"}</div>
                    <div style={{fontSize:11,color:textMuted,marginTop:4}}>{bfLabel(day.bf)}</div>
                  </div>
                </div>
              </div>

              {yest&&(
                <div style={card}>
                  <div style={lbl}>Last 24 Hours · {city==="axmouth"?"Seaton":"London"}</div>
                  <div style={{display:"flex",gap:16,alignItems:"center",marginTop:4}}>
                    <div style={{textAlign:"center",flex:1}}>
                      <div style={{fontSize:11,color:"#60a5fa",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>↓ Low</div>
                      <div style={{fontSize:34,fontWeight:700,letterSpacing:-1,lineHeight:1,color:"#60a5fa"}}>{yest.min}<sup style={{fontSize:"50%",fontWeight:400}}>°C</sup></div>
                      <div style={{fontSize:11,color:textMuted,marginTop:3}}>{yest.short} overnight</div>
                    </div>
                    <div style={{width:"1px",background:border,alignSelf:"stretch"}}/>
                    <div style={{textAlign:"center",flex:1}}>
                      <div style={{fontSize:11,color:"#fbbf24",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>↑ High</div>
                      <div style={{fontSize:34,fontWeight:700,letterSpacing:-1,lineHeight:1,color:"#fbbf24"}}>{yest.max}<sup style={{fontSize:"50%",fontWeight:400}}>°C</sup></div>
                      <div style={{fontSize:11,color:textMuted,marginTop:3}}>{yest.short} afternoon</div>
                    </div>
                  </div>
                </div>
              )}

              <div style={card}>
                <div style={lbl}>Rain Risk · 27h</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3}}>
                  {day.rain3h.slice(0,9).map((pct,i)=>{
                    const s=i*3,e=s+3,bg2=pct>75?"#ef4444":pct>25?"#f59e0b":"#22c55e",tc=pct>25&&pct<=75?"#000":"#fff";
                    return (
                      <div key={i} style={{background:bg2,borderRadius:5,padding:"6px 2px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                        <div style={{fontSize:12,fontWeight:700,color:tc,lineHeight:1}}>{pct}%</div>
                        <div style={{fontSize:9,color:tc,opacity:0.85,textAlign:"center",lineHeight:1.2}}>{String(s).padStart(2,"0")}–{String(e).padStart(2,"0")}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {city==="axmouth"?(
                <div style={card}>
                  <div style={lbl}>Axmouth Swell</div>
                  <div style={{fontSize:19,fontWeight:700,lineHeight:1.3}}>{day.swell}</div>
                  <div style={{fontSize:13,color:textMuted,marginTop:5}}>Sea temp ~{day.seaT}°C</div>
                </div>
              ):(
                <div style={card}>
                  <div style={lbl}>Visibility</div>
                  <div style={{fontSize:19,fontWeight:700,lineHeight:1.3}}>{day.vis}</div>
                  <div style={{fontSize:13,color:textMuted,marginTop:5}}>Humidity {day.hum}%</div>
                </div>
              )}

              <div style={card}>
                <div style={lbl}>Moon Phase</div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:34,lineHeight:1}}>{day.moon.icon}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,lineHeight:1.2}}>{day.moon.name}</div>
                    <div style={{fontSize:13,color:textMuted,marginTop:3}}>{day.moon.pct}% illuminated</div>
                  </div>
                </div>
                <div style={{fontSize:12,color:textMuted,marginTop:8,lineHeight:1.5}}>{day.moon.note}</div>
              </div>

              {city==="axmouth"&&<TideCard day={day} now={now} card={card} border={border} textMuted={textMuted} textPri={textPri}/>}
              <SunCard day={day} now={now} city={city} card={card} border={border} textMuted={textMuted} textPri={textPri}/>
            </div>

            {/* CONDITION */}
            <div style={{...card,marginBottom:14}}>
              <div style={lbl}>Synoptic Summary · {day.short} {day.date}</div>
              <div style={{fontSize:15,lineHeight:1.65}}>{day.condition}</div>
            </div>

            {/* WEEK AT A GLANCE */}
            <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:textMuted,marginBottom:10}}>Week at a Glance</div>
            <div style={{...card,marginBottom:14}}>
              <div style={{marginBottom:16}}>
                <TempGraph days={forecast} selIdx={selIdx} setSelIdx={setSelIdx} textMuted={textMuted} textPri={textPri}/>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr>
                    <td style={{color:textMuted,paddingBottom:7,width:90}}></td>
                    {forecast.map((d,i)=>(
                      <td key={i} onClick={()=>setSelIdx(i)} style={{textAlign:"center",paddingBottom:7,cursor:"pointer",color:i===selIdx?cityAcc:textPri,fontWeight:i===selIdx?700:500}}>{d.short}</td>
                    ))}
                  </tr></thead>
                  <tbody>
                    {[
                      {label:"Gust mph",fn:d=>d.gust,     col:v=>v>=40?"#ef4444":v>=25?"#f97316":textPri},
                      {label:"Wind dir", fn:d=>d.dir,       col:()=>textPri},
                      {label:"Rain %",   fn:d=>d.rain+"%",  col:v=>parseInt(v)>60?"#ef4444":parseInt(v)>30?"#f97316":"#22c55e"},
                      {label:"Humidity", fn:d=>d.hum+"%",   col:()=>textPri},
                    ].map(row=>(
                      <tr key={row.label} style={{borderTop:`1px solid ${border}`}}>
                        <td style={{color:textMuted,padding:"6px 0",fontWeight:500}}>{row.label}</td>
                        {forecast.map((d,i)=>{
                          const val=row.fn(d);
                          return <td key={i} style={{textAlign:"center",fontWeight:600,color:row.col(val),background:i===selIdx?highlight:undefined,padding:"6px 0"}}>{val}</td>;
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>


          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
